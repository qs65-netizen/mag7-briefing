name: Daily MAG7 Briefing

on:
  # Run every day at 7:00 AM UTC (3:00 PM 北京时间)
  schedule:
    - cron: '0 7 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Also run on push to main branch
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate briefing
        run: python main.py

      - name: Copy new design to reports
        run: cp index.html reports/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
